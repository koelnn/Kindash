<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Kindle Dashboard</title>
  <style>
    :root{--bg:#f4efe5;--ink:#171510;--muted:#6a6459;--faint:#928b79;--line:#cfc4b1;--ok:#395b35;--panel-bg:rgba(255,255,255,.24);--radius:20px}
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;background:var(--bg);color:var(--ink);font-family:"Noto Serif SC","Source Han Serif SC","Songti SC","STSong",serif;-webkit-font-smoothing:antialiased}
    .app{width:100%;padding:14px;display:grid;grid-template-rows:1fr 2fr 1.2fr;gap:12px;background:linear-gradient(180deg,#f8f4eb 0%,#f3ede1 100%)}
    .panel{min-height:0;border:2px solid var(--line);border-radius:var(--radius);background:var(--panel-bg);overflow:hidden}
    .identity{display:grid;grid-template-columns:96px minmax(0,1fr);gap:14px;padding:14px 16px;align-items:center}
    .avatar{width:80px;height:80px;border-radius:8px;overflow:hidden;border:2px solid #a79a84;background:#ece4d6;flex-shrink:0}
    .avatar img{width:100%;height:100%;object-fit:cover;display:block}
    .identity-main{min-width:0;display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);grid-template-rows:auto auto;column-gap:12px;row-gap:4px;align-items:center}
    .greeting{grid-column:1;grid-row:1;font-size:22px;line-height:1.1;font-weight:700}
    .weather{grid-column:1;grid-row:2;font-size:16px;color:var(--muted)}
    .poem{grid-column:2;grid-row:1 / span 2;align-self:center;text-align:right;font-size:15px;line-height:1.4;word-break:break-word}
    .focus{padding:14px 16px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:8px}
    .task-name{font-size:32px;font-weight:700;line-height:1.1;word-break:break-word}
    .focus-time{font-size:64px;font-weight:800;letter-spacing:-.04em;line-height:1}
    .review{padding:14px 16px;display:flex;flex-direction:column;gap:8px;justify-content:center}
    .checkline{display:flex;gap:16px;font-size:18px;line-height:1.2}
    .metrics{display:flex;gap:20px;font-size:18px;line-height:1.2}
    .update-row{display:flex;align-items:center;gap:10px;padding-top:8px;border-top:1px solid rgba(120,109,92,.28);font-size:13px;color:var(--faint)}
    .quote{text-align:center;font-size:12px;color:var(--ink);letter-spacing:.02em;margin-top:2px}
    .status{padding:3px 8px;border-radius:999px;border:1px solid var(--ok);color:var(--ok);font-size:12px}
  </style>
</head>
<body>
  <main class="app" id="app">
    <section class="panel identity">
      <div class="avatar" id="avatarWrap"><img src="https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAEU7lBqHtU3Gg-tXOF9ndfGfStjZi8DhwAC7iAAAtox-VT_BHU3mnqhgzsE.png" alt="头像" onerror="this.style.display='none'" /></div>
      <div class="identity-main">
        <div class="greeting" id="greeting">晚上好，大童</div>
        <div class="weather" id="weatherText">北京 25°C</div>
        <div class="poem" id="poemText">枕上诗书闲处好</div>
      </div>
    </section>
    <section class="panel focus">
      <div class="task-name" id="taskName">无任务</div>
      <div class="focus-time" id="focusTime">--:--</div>
    </section>
    <section class="panel review">
      <div class="checkline" id="checkline"><span>上午 ×</span><span>下午 ×</span><span>晚上 ×</span></div>
      <div class="metrics">
        <span id="taskCount">今日（）任务</span>
        <span id="totalFocus">累计（）小时</span>
      </div>
      <div class="update-row">
        <span id="updateTime">更新中…</span>
        <span class="status">同步正常</span>
      </div>
      <div class="quote">VICTORY Belongs To The Most TENACIOUS</div>
    </section>
  </main>
  <script>
    const REFRESH_MS = 90000;
    function setHeight() {
      document.getElementById('app').style.height = window.innerHeight + 'px';
    }
    setHeight();
    window.addEventListener('resize', setHeight);

    function greet(h) { return h<6?'凌晨好':h<12?'上午好':h<18?'下午好':'晚上好'; }
    function renderChecks(s) { return `<span>上午 ${s.morning?'√':'×'}</span><span>下午 ${s.afternoon?'√':'×'}</span><span>晚上 ${s.evening?'√':'×'}</span>`; }

    async function refresh() {
      try {
        const res = await fetch('/api/data');
        if (!res.ok) throw new Error(res.status);
        const d = await res.json();
        const h = new Date(d.serverTime || Date.now()).getHours();
        document.getElementById('greeting').textContent = greet(h) + '，' + (d.userName || '大童');
        document.getElementById('weatherText').textContent = d.weather || '北京 25°C';
        document.getElementById('poemText').textContent = d.poem || '枕上诗书闲处好';
        document.getElementById('taskName').textContent = d.currentTask || '无任务';
        document.getElementById('focusTime').textContent = d.currentDuration || '--:--';
        document.getElementById('checkline').innerHTML = renderChecks(d.shifts || {});
        document.getElementById('taskCount').textContent = d.taskCount || '今日（）任务';
        document.getElementById('totalFocus').textContent = d.totalFocus || '累计（）小时';
        document.getElementById('updateTime').textContent = '更新 ' + (d.updatedAt || '--');
      } catch(e) {
        document.getElementById('updateTime').textContent = '更新失败';
      }
    }
    refresh();
    setInterval(refresh, REFRESH_MS);
  </script>
</body>
</html>
