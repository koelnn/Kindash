<title>Kindle Dashboard</title>
<style>

/* ================================
   Kindle 专用模式（电子墨水优化）
   ================================ */

/* 1. 禁用动画、过渡、阴影、模糊 */
* {
  animation: none !important;
  transition: none !important;
  box-shadow: none !important;
  backdrop-filter: none !important;
}

/* 2. 强制黑白灰色调 */
html, body {
  background: #ffffff !important;
  color: #000000 !important;
  -webkit-filter: grayscale(100%);
  filter: grayscale(100%);
}

/* 3. 适配 Kindle 横屏分辨率 */
html, body {
  width: 1448px;
  height: 1072px;
  margin: 0;
  padding: 0;
  overflow: hidden;
}

/* 4. 使用 Kindle 友好字体 */
body {
  font-family: "Noto Sans SC", sans-serif;
  font-weight: 400;
}

/* 5. 所有图片强制黑白 */
img {
  filter: grayscale(100%);
}

/* 6. 避免 Kindle 渲染抖动 */
* {
  -webkit-font-smoothing: none;
  font-smooth: never;
}

/* 7. 禁止滚动（防止 Puppeteer 截图时偏移） */
body {
  overflow: hidden;
}

/* 8. 强制所有元素不透明 */
* {
  opacity: 1 !important;
}

/* 9. Kindle 不支持半透明背景，全部替换为纯色 */
[class*="bg"], [style*="background"] {
  background: #ffffff !important;
}

/* 10. 竖排诗词优化（防止撑爆） */
.vertical-poem {
  writing-mode: vertical-rl;
  text-orientation: upright;
  white-space: pre-line;
  max-height: 260px;
  overflow: hidden;
  font-size: 26px;
  line-height: 1.8;
}

*{margin:0;padding:0;box-sizing:border-box}
body{width:1448px;height:1072px;background:#fff;font-family:"PingFang SC","Microsoft YaHei",sans-serif;color:#1a1a1a;overflow:hidden}
.canvas{width:1448px;height:1072px;display:flex;flex-direction:column;position:relative}
.canvas::before,.canvas::after{content:"";position:absolute;left:0;right:0;height:3px;background:#1a1a1a}
.canvas::before{top:0}.canvas::after{bottom:0}

.hd{display:flex;padding:40px 72px 0;flex-shrink:0;align-items:flex-start}
.hl{flex:1;display:flex;align-items:flex-start;gap:24px}
.av{width:88px;height:88px;border:2px solid #1a1a1a;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center}
.av img{width:100%;height:100%;object-fit:cover;display:block}
.ui{display:flex;flex-direction:column;gap:4px;padding-top:2px}
.gr{font-size:36px;font-weight:700;letter-spacing:2px;line-height:1.2}
.we{font-size:24px;color:#3a3a3a;letter-spacing:1px}
.hr{width:260px;flex-shrink:0;writing-mode:vertical-rl;font-size:22px;line-height:2.0;color:#2a2a2a;letter-spacing:1.5px;white-space:pre-line;border-left:1px solid #d0d0d0;padding-left:32px}

.dv{margin:30px 72px 0;height:1px;background:#d0d0d0;flex-shrink:0}

.ct{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
.tm{font-size:120px;font-weight:700;letter-spacing:6px;line-height:1;font-family:"SF Mono","Consolas",monospace;text-align:center}
.tl{font-size:24px;color:#555;letter-spacing:4px;margin-top:14px;font-weight:400}

.dv2{margin:0 72px;height:1px;background:#d0d0d0;flex-shrink:0}
.ft{padding:22px 72px 30px;flex-shrink:0;display:flex;flex-direction:column;gap:14px}
.fr{display:flex;flex-direction:row;align-items:center;justify-content:space-between}
.ts{display:flex;gap:28px;font-size:24px;font-weight:500;letter-spacing:1px;flex:1}
.ti{display:flex;align-items:center;gap:6px}
.td{font-size:18px}
.st{font-size:24px;color:#3a3a3a;letter-spacing:1px}
.st strong{font-weight:700;color:#1a1a1a}
.mtc{text-align:center;font-size:20px;color:#888;letter-spacing:0.5px}
.md{display:inline-block;width:4px;height:4px;border-radius:50%;background:#1a1a1a;vertical-align:middle;margin:0 8px}
.mtc span{margin:0 12px}
.qu{text-align:center;font-size:22px;font-weight:500;color:#2a2a2a;letter-spacing:0.5px;font-style:italic}
